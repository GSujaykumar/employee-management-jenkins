name: Spring Boot CI Pipeline

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:

  build-and-test:

    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testdb
          MYSQL_ROOT_HOST: '%'
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=15
          --health-start-period=30s

    env:
      SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/testdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root

    steps:

      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Print toolchain versions
        run: |
          java -version
          mvn -version

      - name: Wait for MySQL to accept connections to testdb
        run: |
          for i in {1..60}; do
            if mysql -h 127.0.0.1 -P 3306 -uroot -proot -e "USE testdb; SELECT 1;" >/dev/null 2>&1; then
              echo "MySQL + testdb are ready"
              exit 0
            fi
            echo "Waiting for MySQL/testdb... ($i/60)"
            sleep 2
          done
          echo "MySQL/testdb did not become ready in time"
          mysql -h 127.0.0.1 -P 3306 -uroot -proot -e "SHOW DATABASES;" || true
          exit 1

      - name: Build, Run Tests and Package
        run: mvn -B -e clean package

      - name: Upload Surefire test reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: |
            target/surefire-reports/**
            target/site/**
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload JAR artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: employee-management-jar
          path: target/*.jar
          if-no-files-found: error
          retention-days: 7
