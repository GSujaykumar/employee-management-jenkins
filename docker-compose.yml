version: '3.8'

services:

  mysql:
    image: mysql:8
    container_name: mysql-container
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: employee_db
    ports:
      - "3308:3306"

  employee-app:
    build: .
    container_name: employee-management-app
    depends_on:
      - mysql
    ports:
      - "8080:8080"